version: '3.8'

services:
  mongodb:
    image: mongo
    container_name: expensetracker-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    networks:
      - appnet
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express
    container_name: expensetracker-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    image: expensetracker-api
    container_name: expensetracker-backend
    ports:
      - "8099:8099"
    environment:
      MONGO_URI: "mongodb://admin:password@mongodb:27017/expense-tracker?authSource=admin"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    image: expensetracker-ui
    container_name: expensetracker-frontend
    ports:
      - "3099:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8099
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mongo-data:
