version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: expensetracker-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - appnet
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0
    container_name: expensetracker-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - appnet

  backend:
    build:
      context: ./backend
    container_name: expensetracker-backend
    ports:
      - "8099:8099"
    environment:
      MONGO_URI: "mongodb://admin:admin@mongo:27017/expense-tracker?authSource=admin"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    container_name: expensetracker-frontend
    ports:
      - "3099:80"  # Changed to match Nginx port
    environment:
      - REACT_APP_API_URL=http://localhost:8099
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  mongodb_data:
